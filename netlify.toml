[build]
  command = "npm ci && npx patch-package && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Everything else (HTML, etc) — browser revalidates, Cloudflare caches for 1 hour
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, must-revalidate"

# Hashed assets (JS/CSS/etc) — cache forever in both browser and Cloudflare
# Must come after /* so it takes precedence (last matching rule wins)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
